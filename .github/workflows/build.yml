name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip source
        run: unzip CrazyClient-source-v1-1*.zip

      - name: Find and move to project root
        run: |
          cd $(find . -name "gradlew" -not -path "./.git/*" | head -1 | xargs dirname)
          echo "PROJECT_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant gradlew permission
        run: chmod +x $PROJECT_DIR/gradlew

      - name: Build APK
        run: cd $PROJECT_DIR && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CrazyClient-APK
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
